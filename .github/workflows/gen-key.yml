name: Generate Signing Key

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Generate signing key
        shell: pwsh
        run: |
          $env:TAURI_KEY_PASSWORD = ""
          echo "" | npx @tauri-apps/cli signer generate -w tauri-signing.key -p ""
          Write-Host "=== PUBLIC KEY ==="
          Get-Content tauri-signing.key.pub
          Write-Host "=== PRIVATE KEY BASE64 ==="
          $bytes = [System.IO.File]::ReadAllBytes("tauri-signing.key")
          [System.Convert]::ToBase64String($bytes)

      - name: Upload public key as artifact
        uses: actions/upload-artifact@v4
        with:
          name: signing-keys
          path: |
            tauri-signing.key.pub
            tauri-signing.key.b64
